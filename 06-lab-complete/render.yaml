services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
