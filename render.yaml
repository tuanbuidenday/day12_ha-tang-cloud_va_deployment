# ============================================================
# render.yaml — MUST live at the repo ROOT for Render Blueprint.
# The actual app lives in 06-lab-complete/, so rootDir points there:
# Render uses 06-lab-complete/ as the Docker build context and reads
# 06-lab-complete/Dockerfile.
# ============================================================
services:
  - type: web
    name: ai-agent-production
    runtime: docker
    rootDir: 06-lab-complete        # build context + Dockerfile location
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          name: agent-redis
          type: keyvalue
          property: connectionString
      - key: LOG_LEVEL
        value: INFO
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"

  # Redis (Render "Key Value") — shared state: rate limit, cost guard, history
  - type: keyvalue
    name: agent-redis
    region: singapore
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []   # empty = chỉ cho phép kết nối nội bộ trong Render
